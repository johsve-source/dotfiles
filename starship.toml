# ~/.config/starship.toml

# Main prompt format
format = """
$directory\
$git_branch\
$git_status\
$line_break\
$character"""

# Set timeout for commands (in milliseconds)
command_timeout = 1000

# Directory
[directory]
truncation_length = 3
truncate_to_repo = true
style = "blue bold"

# Git Branch
[git_branch]
format = "[$branch]($style) "
style = "green"

# Git Status
[git_status]
format = '([\[ $all_status$ahead_behind\]]($style))'
conflicted = "[$countC ](red)"
ahead = "[$count⇡ ](blue)"
behind = "[$count⇣ ](yellow)"
diverged = "[$ahead_count⇡ $behind_count⇣ ](yellow)"
untracked = "[$count? ](cyan)"
stashed = "[$count$ ](blue)"
modified = "[$count! ](yellow)"
staged = "[$count+ ](green)"
renamed = "[$count» ](blue)"
deleted = "[$count✘ ](red)"
style = "bold"

# Prompt Character
[character]
success_symbol = "[❯](green bold)"
error_symbol = "[✗](red bold)"

# Disable other modules to keep the prompt lean
[aws]
disabled = true

[cmake]
disabled = true

